name: WP-11 pg_trgm staging read-only preflight

on:
  push:
    branches: [codex/wp11-staging-recovery]
    paths:
      - .github/workflows/wp11-pg-trgm-read-only-preflight.yml
      - scripts/check-wp11-pg-trgm-preflight.ts

permissions:
  contents: read

concurrency:
  group: wp11-pg-trgm-staging-read-only-preflight
  cancel-in-progress: false

jobs:
  inventory:
    if: github.repository == 'cntlouie/repairprint-index'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout exact preflight source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Confirm isolated preflight identity
        shell: bash
        env:
          APPROVED_BASE: 86a13649034b94abfa05e5884781344d82a5a759
          APPROVED_TREE: cd78badb29ee1f890715fe44481b8ba2ec0a2044
          PREFLIGHT_PARENT: 72ed7228dfbe0b4ec2d2573351c1a01b5db57767
        run: |
          set -euo pipefail
          test "$(git merge-base HEAD "$APPROVED_BASE")" = "$APPROVED_BASE"
          test "$(git rev-parse "$PREFLIGHT_PARENT^{tree}")" = "$APPROVED_TREE"
          diff_files="$(git diff --name-only "$PREFLIGHT_PARENT" HEAD | sort)"
          expected_files="$(printf '%s\n' \
            '.github/workflows/wp11-pg-trgm-read-only-preflight.yml' \
            'scripts/check-wp11-pg-trgm-preflight.ts' | sort)"
          test "$diff_files" = "$expected_files"
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Require the staging database secret
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_DIRECT_URL }}
        run: test -n "$DATABASE_URL"
      - name: Inventory pg_trgm in a read-only transaction
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_DIRECT_URL }}
        run: node --import tsx scripts/check-wp11-pg-trgm-preflight.ts
