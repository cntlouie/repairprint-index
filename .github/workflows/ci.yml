name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: repairprint_test
          POSTGRES_USER: repairprint
          POSTGRES_PASSWORD: repairprint
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U repairprint -d repairprint_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Confirm exact source head
        env:
          EXPECTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Install deterministic Chromium runtime
        run: npx playwright install --with-deps chromium
      - name: Run complete verification gate
        env:
          DEMO_MODE: "true"
          DATABASE_TEST_URL: postgres://repairprint:repairprint@127.0.0.1:5432/repairprint_test
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run check

  migrate-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout reviewed main
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Require the staging database secret
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_DIRECT_URL }}
        run: test -n "$DATABASE_URL"
      - name: Apply reviewed staging migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_DIRECT_URL }}
        run: npm run db:migrate
      - name: Verify staging migration ledger hashes
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_DIRECT_URL }}
        run: npm run db:ledger:check
      - name: Verify the staging auth and audit foundation
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_DIRECT_URL }}
        run: npm run db:auth-audit:check
