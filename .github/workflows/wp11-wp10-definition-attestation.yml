name: WP-11 WP-10 definition identity attestation

on:
  push:
    branches:
      - codex/wp11-staging-recovery-phase2
    paths:
      - .github/workflows/wp11-wp10-definition-attestation.yml
      - scripts/check-wp11-wp10-definition-attestation.ts

permissions:
  contents: read

concurrency:
  group: wp11-wp10-definition-attestation
  cancel-in-progress: false

jobs:
  attest:
    name: Read-only WP-10 definition identity
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: repairprint_test
          POSTGRES_PASSWORD: repairprint
          POSTGRES_USER: repairprint
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U repairprint -d repairprint_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out the temporary attestation commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Verify approved parent and temporary scope
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = "8723114e467e27c515b854b8cf9bb2a6c7be768e"
          test "$(git show -s --format=%T HEAD^)" = "9f98665d76cae8b235d40f31f955d6985f7c297e"
          mapfile -t changed < <(git diff --name-only HEAD^ HEAD)
          test "${#changed[@]}" -eq 2
          test "${changed[0]}" = ".github/workflows/wp11-wp10-definition-attestation.yml"
          test "${changed[1]}" = "scripts/check-wp11-wp10-definition-attestation.ts"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run the read-only attestation
        env:
          CI: "true"
          FRESH_DATABASE_URL: postgres://repairprint:repairprint@127.0.0.1:5432/repairprint_test
          STAGING_DATABASE_DIRECT_URL: ${{ secrets.STAGING_DATABASE_DIRECT_URL }}
        run: node --import tsx scripts/check-wp11-wp10-definition-attestation.ts
