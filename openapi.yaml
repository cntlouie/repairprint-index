openapi: 3.1.0
info:
  title: RepairPrint Index API
  version: 0.3.0
  description: First-party API contract. Anonymous contributions are origin-bound, human-verified, rate-limited, deduplicated, and always enter a private moderation queue. Aggregate analytics is a separate best-effort, same-origin boundary that accepts no contribution payload.
servers:
  - url: https://example.invalid/api/v1
    description: Replace with the production origin.
paths:
  /search:
    get:
      operationId: searchCatalog
      summary: Search exact model identifiers, OEM part numbers, and component names.
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string, minLength: 2, maxLength: 160 }
        - in: query
          name: cursor
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Ranked search results.
          content:
            application/json:
              schema:
                type: object
                required: [query, results]
                properties:
                  query: { type: string }
                  nextCursor: { type: [string, "null"] }
                  results:
                    type: array
                    items: { $ref: "#/components/schemas/SearchResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /analytics/events:
    post:
      operationId: recordBrowserAnalyticsEvent
      summary: Submit one privacy-bounded, best-effort first-party analytics event.
      description: Accepts only the documented browser event union as identity-encoded JSON up to 4096 bytes. A valid event receives 202 even when disabled or dropped; analytics never controls the user journey. Raw search text, contribution values, contact/media/network/browser identifiers, cookies, full referrers, and unknown properties are rejected by omission from the strict schema.
      parameters:
        - { $ref: "#/components/parameters/AnalyticsOrigin" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BrowserAnalyticsEvent" }
      responses:
        "202": { $ref: "#/components/responses/AnalyticsAccepted" }
        "400": { $ref: "#/components/responses/AnalyticsBadRequest" }
        "403": { $ref: "#/components/responses/AnalyticsForbidden" }
        "413": { $ref: "#/components/responses/AnalyticsPayloadTooLarge" }
        "415": { $ref: "#/components/responses/AnalyticsUnsupportedMediaType" }
  /submissions/requests:
    post:
      operationId: createMissingPartRequest
      summary: Submit a private missing-part request.
      parameters:
        - { $ref: "#/components/parameters/SubmissionOrigin" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MissingPartRequest" }
          application/x-www-form-urlencoded:
            schema: { $ref: "#/components/schemas/MissingPartRequest" }
      responses:
        "202": { $ref: "#/components/responses/Accepted" }
        "303": { $ref: "#/components/responses/FormAccepted" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "413": { $ref: "#/components/responses/PayloadTooLarge" }
        "415": { $ref: "#/components/responses/UnsupportedMediaType" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /submissions/fit-confirmations:
    post:
      operationId: createFitConfirmation
      summary: Submit a private, moderated fit outcome.
      parameters:
        - { $ref: "#/components/parameters/SubmissionOrigin" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FitConfirmation" }
          application/x-www-form-urlencoded:
            schema: { $ref: "#/components/schemas/FitConfirmation" }
      responses:
        "202": { $ref: "#/components/responses/Accepted" }
        "303": { $ref: "#/components/responses/FormAccepted" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "413": { $ref: "#/components/responses/PayloadTooLarge" }
        "415": { $ref: "#/components/responses/UnsupportedMediaType" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /submissions/designs:
    post:
      operationId: createDesignSubmission
      summary: Submit an original design landing-page URL for private review.
      parameters:
        - { $ref: "#/components/parameters/SubmissionOrigin" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DesignSubmission" }
          application/x-www-form-urlencoded:
            schema: { $ref: "#/components/schemas/DesignSubmission" }
      responses:
        "202": { $ref: "#/components/responses/Accepted" }
        "303": { $ref: "#/components/responses/FormAccepted" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "413": { $ref: "#/components/responses/PayloadTooLarge" }
        "415": { $ref: "#/components/responses/UnsupportedMediaType" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
components:
  parameters:
    AnalyticsOrigin:
      in: header
      name: Origin
      required: true
      description: Exact configured RepairPrint origin; missing, null, or cross-origin values are rejected.
      schema: { type: string, format: uri }
    SubmissionOrigin:
      in: header
      name: Origin
      required: true
      description: Exact configured RepairPrint origin. Browser forms supply this automatically.
      schema: { type: string, format: uri }
  schemas:
    BrowserAnalyticsEvent:
      oneOf:
        - { $ref: "#/components/schemas/SearchSubmittedAnalyticsEvent" }
        - { $ref: "#/components/schemas/SearchResolvedAnalyticsEvent" }
        - { $ref: "#/components/schemas/VariantDisambiguationShownAnalyticsEvent" }
        - { $ref: "#/components/schemas/VariantSelectedAnalyticsEvent" }
        - { $ref: "#/components/schemas/ZeroResultAnalyticsEvent" }
        - { $ref: "#/components/schemas/PartViewedAnalyticsEvent" }
        - { $ref: "#/components/schemas/OriginalSourceClickedAnalyticsEvent" }
        - { $ref: "#/components/schemas/FitReportStartedAnalyticsEvent" }
      discriminator:
        propertyName: name
    SearchSubmittedAnalyticsEvent:
      type: object
      additionalProperties: false
      required: [name, properties]
      properties:
        name: { type: string, const: search_submitted }
        properties:
          type: object
          additionalProperties: false
          required: [normalizedCategory, queryLength, identifierLike]
          properties:
            normalizedCategory: { type: string, enum: [identifier, component, mixed, other] }
            queryLength: { type: integer, minimum: 2, maximum: 160 }
            identifierLike: { type: boolean }
    SearchResolvedAnalyticsEvent:
      type: object
      additionalProperties: false
      required: [name, properties]
      properties:
        name: { type: string, const: search_resolved }
        properties:
          type: object
          additionalProperties: false
          required: [entityType, matchClass, rank, ambiguityCount]
          properties:
            entityType: { type: string, enum: [model, part] }
            matchClass: { type: string, enum: [strict_identifier, loose_identifier, model_component, text, trigram] }
            rank: { type: integer, minimum: 1, maximum: 50 }
            ambiguityCount: { type: integer, minimum: 0, maximum: 50 }
    VariantDisambiguationShownAnalyticsEvent:
      type: object
      additionalProperties: false
      required: [name, properties]
      properties:
        name: { type: string, const: variant_disambiguation_shown }
        properties:
          type: object
          additionalProperties: false
          required: [candidateCount]
          properties:
            candidateCount: { type: integer, minimum: 2, maximum: 50 }
    VariantSelectedAnalyticsEvent:
      type: object
      additionalProperties: false
      required: [name, properties]
      properties:
        name: { type: string, const: variant_selected }
        properties:
          type: object
          additionalProperties: false
          required: [selectedRank]
          properties:
            selectedRank: { type: integer, minimum: 1, maximum: 50 }
    ZeroResultAnalyticsEvent:
      type: object
      additionalProperties: false
      required: [name, properties]
      properties:
        name: { type: string, const: zero_result }
        properties:
          type: object
          additionalProperties: false
          required: [tokenClass]
          properties:
            tokenClass: { type: string, enum: [numeric, alphanumeric, words, mixed] }
            brand: { type: string, minLength: 1, maxLength: 80, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
            category: { type: string, minLength: 1, maxLength: 80, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
    PartViewedAnalyticsEvent:
      type: object
      additionalProperties: false
      required: [name, properties]
      properties:
        name: { type: string, const: part_viewed }
        properties:
          type: object
          additionalProperties: false
          required: [publicId, confidenceTier, safetyClass]
          properties:
            publicId: { type: string, minLength: 1, maxLength: 120, pattern: '^[A-Za-z0-9][A-Za-z0-9_-]*$' }
            confidenceTier: { type: string, enum: [verified_fit, community_confirmed, creator_listed] }
            safetyClass: { type: string, const: low }
    OriginalSourceClickedAnalyticsEvent:
      type: object
      additionalProperties: false
      required: [name, properties]
      properties:
        name: { type: string, const: original_source_clicked }
        properties:
          type: object
          additionalProperties: false
          required: [publicId, sourcePlatform, confidenceTier]
          properties:
            publicId: { type: string, minLength: 1, maxLength: 120, pattern: '^[A-Za-z0-9][A-Za-z0-9_-]*$' }
            sourcePlatform: { type: string, minLength: 1, maxLength: 80, pattern: '^[a-z0-9][a-z0-9._-]*$' }
            confidenceTier: { type: string, enum: [verified_fit, community_confirmed, creator_listed] }
    FitReportStartedAnalyticsEvent:
      type: object
      additionalProperties: false
      required: [name, properties]
      properties:
        name: { type: string, const: fit_report_started }
        properties:
          type: object
          additionalProperties: false
          required: [publicId]
          properties:
            publicId: { type: string, minLength: 1, maxLength: 120, pattern: '^[A-Za-z0-9][A-Za-z0-9_-]*$' }
    AnalyticsAccepted:
      type: object
      additionalProperties: false
      required: [accepted]
      properties:
        accepted: { type: boolean, const: true }
    AnalyticsErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code]
          properties:
            code:
              type: string
              enum: [ANALYTICS_ORIGIN_FORBIDDEN, INVALID_ANALYTICS_EVENT, PAYLOAD_TOO_LARGE, UNSUPPORTED_MEDIA_TYPE]
    SearchResult:
      type: object
      required: [type, title, subtitle, href, matchReason]
      properties:
        type: { type: string, enum: [model, part] }
        publicId: { type: string }
        title: { type: string }
        subtitle: { type: string }
        href: { type: string }
        matchReason: { type: string, enum: [exact_model, exact_oem, strict_prefix, model_component, fuzzy_name, full_text] }
        confidence: { type: [string, "null"], enum: [verified_fit, community_confirmed, creator_listed, candidate_match, disputed, null] }
    MissingPartRequest:
      type: object
      additionalProperties: false
      required: [brand, modelNumber, brokenPart, privacyConsent, contributionConsent, idempotencyKey, challengeToken]
      properties:
        brand: { type: string, minLength: 1, maxLength: 100 }
        modelNumber: { type: string, minLength: 1, maxLength: 120 }
        brokenPart: { type: string, minLength: 2, maxLength: 160 }
        oemPartNumber: { type: string, maxLength: 120 }
        notes: { type: string, maxLength: 2000 }
        email: { type: string, format: email, maxLength: 320 }
        emailFollowUpConsent: { type: boolean, description: Required and true whenever email is supplied. }
        privacyConsent: { type: boolean, const: true }
        contributionConsent: { type: boolean, const: true }
        idempotencyKey: { type: string, format: uuid }
        challengeToken: { type: string, minLength: 1, maxLength: 2048, description: Single-use Turnstile token; never stored. }
        website: { type: string, maxLength: 200, description: Browser anti-spam field; leave empty. }
    FitConfirmation:
      type: object
      additionalProperties: false
      required: [partSlug, modelNumber, designRevision, outcome, privacyConsent, contributionConsent, idempotencyKey, challengeToken]
      properties:
        partSlug: { type: string, minLength: 1, maxLength: 200 }
        modelNumber: { type: string, minLength: 1, maxLength: 120 }
        designRevision: { type: string, minLength: 1, maxLength: 80 }
        outcome:
          type: string
          enum: [fits_without_modification, fits_after_modification, does_not_fit, print_failed, unsure]
        modificationNotes: { type: string, maxLength: 2000 }
        printSettings: { type: string, maxLength: 2000 }
        evidenceUrl: { type: string, format: uri, pattern: "^https?://", maxLength: 2048, description: Raw controls, encoded controls, malformed percent encoding, backslashes, credentials and non-HTTP(S) schemes are rejected; the canonical HTTP(S) URL is stored for private moderation only and RepairPrint does not fetch it. }
        email: { type: string, format: email, maxLength: 320 }
        emailFollowUpConsent: { type: boolean, description: Required and true whenever email is supplied. }
        privacyConsent: { type: boolean, const: true }
        contributionConsent: { type: boolean, const: true }
        idempotencyKey: { type: string, format: uuid }
        challengeToken: { type: string, minLength: 1, maxLength: 2048, description: Single-use Turnstile token; never stored. }
        website: { type: string, maxLength: 200, description: Browser anti-spam field; leave empty. }
    DesignSubmission:
      type: object
      additionalProperties: false
      required: [sourceUrl, creatorName, brand, modelNumber, componentName, claimedLicense, privacyConsent, contributionConsent, idempotencyKey, challengeToken]
      properties:
        sourceUrl: { type: string, format: uri, pattern: "^https?://", maxLength: 2048, description: Raw controls, encoded controls, malformed percent encoding, backslashes, credentials and non-HTTP(S) schemes are rejected; the canonical HTTP(S) URL is stored for private moderation only and RepairPrint does not fetch it. }
        creatorName: { type: string, minLength: 1, maxLength: 120 }
        brand: { type: string, minLength: 1, maxLength: 100 }
        modelNumber: { type: string, minLength: 1, maxLength: 120 }
        componentName: { type: string, minLength: 2, maxLength: 160 }
        claimedLicense: { type: string, minLength: 1, maxLength: 80 }
        notes: { type: string, maxLength: 2000 }
        email: { type: string, format: email, maxLength: 320 }
        emailFollowUpConsent: { type: boolean, description: Required and true whenever email is supplied. }
        privacyConsent: { type: boolean, const: true }
        contributionConsent: { type: boolean, const: true }
        idempotencyKey: { type: string, format: uuid }
        challengeToken: { type: string, minLength: 1, maxLength: 2048, description: Single-use Turnstile token; never stored. }
        website: { type: string, maxLength: 200, description: Browser anti-spam field; leave empty. }
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code: { type: string }
            message: { type: string }
            field: { type: [string, "null"] }
            requestId: { type: string }
    Accepted:
      type: object
      required: [id, status]
      properties:
        id: { type: string, format: uuid, description: Stable opaque receipt for this endpoint- and canonical-network-scoped idempotent request; it is not the private submission row identifier. }
        status: { type: string, const: pending }
  headers:
    AnalyticsCacheControl:
      description: Analytics responses are private and never cached.
      schema: { type: string, const: "private, no-store, max-age=0" }
    AnalyticsRobotsControl:
      description: Analytics responses are excluded from crawling and archives.
      schema: { type: string, const: "noindex, nofollow, noarchive" }
  responses:
    AnalyticsAccepted:
      description: The bounded event shape was accepted for best-effort handling; this does not promise persistence.
      headers:
        Cache-Control: { $ref: "#/components/headers/AnalyticsCacheControl" }
        X-Robots-Tag: { $ref: "#/components/headers/AnalyticsRobotsControl" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/AnalyticsAccepted" }
    AnalyticsBadRequest:
      description: The body is malformed or does not match one strict browser analytics event shape.
      headers:
        Cache-Control: { $ref: "#/components/headers/AnalyticsCacheControl" }
        X-Robots-Tag: { $ref: "#/components/headers/AnalyticsRobotsControl" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/AnalyticsErrorEnvelope" }
    AnalyticsForbidden:
      description: The Origin header is missing, null, or different from the configured site origin.
      headers:
        Cache-Control: { $ref: "#/components/headers/AnalyticsCacheControl" }
        X-Robots-Tag: { $ref: "#/components/headers/AnalyticsRobotsControl" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/AnalyticsErrorEnvelope" }
    AnalyticsPayloadTooLarge:
      description: The identity-encoded body exceeds 4096 bytes.
      headers:
        Cache-Control: { $ref: "#/components/headers/AnalyticsCacheControl" }
        X-Robots-Tag: { $ref: "#/components/headers/AnalyticsRobotsControl" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/AnalyticsErrorEnvelope" }
    AnalyticsUnsupportedMediaType:
      description: Analytics accepts only application/json with absent or identity content encoding.
      headers:
        Cache-Control: { $ref: "#/components/headers/AnalyticsCacheControl" }
        X-Robots-Tag: { $ref: "#/components/headers/AnalyticsRobotsControl" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/AnalyticsErrorEnvelope" }
    Accepted:
      description: Accepted into a private moderation queue; not published.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Accepted" }
    FormAccepted:
      description: Browser form accepted and redirected to its fixed same-origin confirmation page.
      headers:
        Location:
          schema: { type: string }
    BadRequest:
      description: Invalid or ambiguous request.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        text/html:
          schema: { type: string }
    RateLimited:
      description: Anonymous submission limit exceeded.
      headers:
        Retry-After:
          schema: { type: integer, minimum: 1 }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        text/html:
          schema: { type: string }
    Forbidden:
      description: The request did not come from the configured origin.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        text/html:
          schema: { type: string }
    Conflict:
      description: The idempotency token was reused for different request content.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        text/html:
          schema: { type: string }
    PayloadTooLarge:
      description: The request exceeds the anonymous-write byte limit.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        text/html:
          schema: { type: string }
    UnsupportedMediaType:
      description: Only JSON and URL-encoded form bodies with identity encoding are accepted.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        text/html:
          schema: { type: string }
    ServiceUnavailable:
      description: Human verification or the private queue is unavailable; the request was not accepted.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        text/html:
          schema: { type: string }
