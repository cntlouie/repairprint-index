services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: repairprint
      POSTGRES_USER: repairprint
      POSTGRES_PASSWORD: repairprint
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repairprint -d repairprint"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - repairprint_postgres:/var/lib/postgresql/data

volumes:
  repairprint_postgres:
